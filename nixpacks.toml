[phases.setup]
nixPkgs = [
    "php81",
    "php81Extensions.pdo",
    "php81Extensions.pdo_mysql",
    "php81Extensions.mbstring",
    "php81Extensions.xml",
    "php81Extensions.curl",
    "php81Extensions.zip",
    "php81Extensions.gd",
    "php81Extensions.fileinfo",
    "php81Extensions.tokenizer",
    "php81Extensions.bcmath"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan storage:link --quiet && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
